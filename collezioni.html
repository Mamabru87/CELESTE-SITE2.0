<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CÉLESTE — Collezioni">
  <title>CÉLESTE — Collezioni</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="header">
    <div class="container">
      <div class="header__row">
        <a href="index.html" class="header__logo">
          <img src="img/CELESTE-LOGO.svg" alt="CÉLESTE">
        </a>
        <button class="header__menu-toggle" id="menuToggle">Menù</button>
      </div>

      <div class="header__dropdown" id="dropdown">
        <nav class="header__nav">
          <a href="collezioni.html">Collezioni</a>
          <a href="studio.html">Studio</a>
          <a href="appuntamento.html">Appuntamento</a>
          <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">Instagram</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- ========== MAIN ========== -->
  <main class="main-content">
    <section class="collezioni">
      <div class="container">
        <h2 class="collezioni__title">Collezioni</h2>

        <div class="collezioni__grid">
          <!-- ARIA -->
          <div class="collezioni__item">
            <a href="aria.html" class="collezioni__img">
              <img src="img/ARIA.png" alt="Aria">
            </a>
            <h3 class="collezioni__name">Aria</h3>
            <p class="collezioni__desc">Etereo e romantico.<br>Petali come veli, volumi sospesi.</p>
          </div>

          <!-- METALLO -->
          <div class="collezioni__item">
            <a href="metallo.html" class="collezioni__img">
              <img src="img/METALLO.png" alt="Metallo">
            </a>
            <h3 class="collezioni__name">Metallo</h3>
            <p class="collezioni__desc">Geometria e materia.<br>Strutture che trattengono il tempo.</p>
          </div>

          <!-- MOIRÉ -->
          <div class="collezioni__item">
            <a href="moire.html" class="collezioni__img">
              <img src="img/moirè.png" alt="Moiré">
            </a>
            <h3 class="collezioni__name">Moiré</h3>
            <p class="collezioni__desc">Istinto e sorpresa.<br>La piega inattesa del tessuto.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 CÉLESTE. Tutti i diritti riservati.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
